name: Deploy Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'docs/**'
      - 'packages/app/**'
      - 'packages/engine/**'
      - '.github/workflows/deploy-pages.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel an in-progress run
# so a queued deployment can finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs + app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build engine
        run: pnpm --filter @glc/engine build

      - name: Build app
        run: pnpm --filter @glc/app build

      - name: Build VitePress site
        run: pnpm --filter @glc/docs build

      # Stage the final Pages site:
      #   /            -> VitePress docs (base: '/gifloopcoder/')
      #   /app/        -> Studio app (Vite base: './', so it works at any sub-path)
      - name: Stage Pages site
        run: |
          mkdir -p docs/.vitepress/dist/app
          cp -R packages/app/dist/. docs/.vitepress/dist/app/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
